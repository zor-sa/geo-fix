name: Test on Windows

on:
  push:
    branches: [main, feature/*]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        run: |
          python -m pytest test/test_presets.py test/test_proxy_addon.py test/test_system_config.py test/test_health_check.py test/test_main.py -v --tb=short
      - name: Run security-hardening unit tests
        run: |
          python -m pytest test/test_ca_lifecycle.py test/test_cleanup_paths.py test/test_firefox_backup.py test/test_port_selection.py test/test_watchdog.py test/test_ca_key_deletion.py test/test_r2_fixes.py test/unit/ -v --tb=short
      - name: Run resource-optimization unit tests
        run: |
          python -m pytest test/test_master_setup.py test/test_ram_monitor.py -v --tb=short

  integration-tests:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run integration tests
        run: python -m pytest test/test_integration_windows.py test/test_integration_security.py -v --tb=short -x
      - name: Run resource-optimization integration tests
        run: python -m pytest test/test_integration_proxy.py -v --tb=short -x
      - name: Run E2E security lifecycle tests
        run: python -m pytest test/test_e2e_security.py -v --tb=short -x

  e2e-browser-tests:
    runs-on: windows-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright
          python -m playwright install chromium
      - name: Run E2E browser tests
        run: python -m pytest test/test_e2e_browser.py -v --tb=short -x

  resource-benchmarks:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run resource benchmark tests
        run: python -m pytest test/test_resource_benchmark.py -v --tb=short -x
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
          retention-days: 90
